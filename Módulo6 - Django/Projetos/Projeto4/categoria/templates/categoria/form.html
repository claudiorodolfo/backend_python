{% extends 'categoria/base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div>
    <h4>{{ titulo }}</h4>
    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome"
                   value="{% if categoria %}{{ categoria.nome }}{% endif %}" required>
        </div>

        <div>
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3">{% if categoria %}{{ categoria.descricao }}{% endif %}</textarea>
        </div>

        <div>
            <input type="checkbox" id="ativa" name="ativa"
                   {% if categoria and categoria.ativa or not categoria %}checked{% endif %}>
            <label for="ativa">Ativa</label>
        </div>

        <div>
            <button type="submit">Salvar</button>
            <a href="{% url 'categoria:lista' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
