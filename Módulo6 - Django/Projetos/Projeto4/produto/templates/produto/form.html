{% extends 'produto/base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div>
    <h4>{{ titulo }}</h4>
    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome"
                   value="{% if produto %}{{ produto.nome }}{% endif %}" required>
        </div>

        <div>
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3">{% if produto %}{{ produto.descricao }}{% endif %}</textarea>
        </div>

        <div>
            <label for="preco">Preço *</label>
            <input type="text" id="preco" name="preco" placeholder="0.00"
                   value="{% if produto %}{{ produto.preco }}{% endif %}" required>
        </div>

        <div>
            <label for="estoque">Estoque *</label>
            <input type="number" id="estoque" name="estoque" min="0"
                   value="{% if produto %}{{ produto.estoque }}{% else %}0{% endif %}" required>
        </div>

        <div>
            <label for="categoria">Categoria *</label>
            <select id="categoria" name="categoria" required>
                <option value="">-- Selecione --</option>
                {% for cat in categorias %}
                <option value="{{ cat.id }}" {% if produto and produto.categoria_id == cat.id %}selected{% endif %}>{{ cat.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <input type="checkbox" id="ativo" name="ativo"
                   {% if produto and produto.ativo or not produto %}checked{% endif %}>
            <label for="ativo">Ativo</label>
        </div>

        <div>
            <button type="submit">Salvar</button>
            <a href="{% url 'produto:lista' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
