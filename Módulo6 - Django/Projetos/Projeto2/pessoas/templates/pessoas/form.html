{% extends 'pessoas/base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div>
    <h4>{{ titulo }}</h4>
    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nome">{{ label_nome }} *</label>
            <input type="text" id="nome" name="nome"
                   value="{% if pessoa %}{{ pessoa.nome }}{% endif %}" required>
        </div>

        <div>
            <label for="email">{{ label_email }} *</label>
            <input type="email" id="email" name="email"
                   value="{% if pessoa %}{{ pessoa.email }}{% endif %}" required>
        </div>

        <div>
            <label for="telefone">{{ label_telefone }}</label>
            <input type="text" id="telefone" name="telefone"
                   value="{% if pessoa %}{{ pessoa.telefone }}{% endif %}">
        </div>

        <div>
            <label for="data_nascimento">{{ label_data_nascimento }}</label>
            <input type="date" id="data_nascimento" name="data_nascimento"
                   value="{% if pessoa and pessoa.data_nascimento %}{{ pessoa.data_nascimento|date:'Y-m-d' }}{% endif %}">
        </div>

        <div>
            <label for="cpf">{{ label_cpf }}</label>
            <input type="text" id="cpf" name="cpf"
                   value="{% if pessoa %}{{ pessoa.cpf }}{% endif %}">
        </div>

        <div>
            <label for="endereco">{{ label_endereco }}</label>
            <textarea id="endereco" name="endereco" rows="3">{% if pessoa %}{{ pessoa.endereco }}{% endif %}</textarea>
        </div>

        <div>
            <input type="checkbox" id="ativo" name="ativo"
                   {% if pessoa and pessoa.ativo or not pessoa %}checked{% endif %}>
            <label for="ativo">{{ label_ativo }}</label>
        </div>

        <div>
            <button type="submit">Salvar</button>
            <a href="{% url 'pessoas:lista' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
